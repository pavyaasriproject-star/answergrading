<!DOCTYPE html>
<html>
<head>
  <title>AI Answer Evaluator</title>
</head>
<body>
  <h2>Upload Files</h2>
  <form id="form">
    Question Paper: <input type="file" id="qp"><br><br>
    Answer Key (typed): <input type="file" id="ak"><br><br>
    Student Handwritten: <input type="file" id="sh"><br><br>
    <button type="submit">Evaluate</button>
  </form>
  <pre id="result"></pre>

<script>
document.getElementById('form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const qp = document.getElementById('qp').files[0];
  const ak = document.getElementById('ak').files[0];
  const sh = document.getElementById('sh').files[0];

  const fd = new FormData();
  fd.append('qp', qp);
  fd.append('ak', ak);
  fd.append('sh', sh);

  document.getElementById('result').textContent = "Processing... please wait";

  const res = await fetch('/api/evaluate', {
    method: 'POST',
    body: fd
  });

  const text = await res.text();
  document.getElementById('result').textContent = text;
});
</script>
</body>
</html>
